version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: or_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: or_gateway
    # ports:
    #   - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: or_redis
    # ports:
    #   - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: or_api
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: or_worker
    depends_on:
      - postgres
      - redis

volumes:
  pgdata: